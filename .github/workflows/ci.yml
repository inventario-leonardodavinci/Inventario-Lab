name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventario_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Caché de dependencias Composer
        uses: actions/cache@v4
        with:
          path: backend/api/vendor
          key: composer-${{ hashFiles('backend/api/composer.lock') }}
          restore-keys: composer-
      - run: composer install --no-interaction --prefer-dist
      - run: cp .env.example .env
      - run: php artisan key:generate
      - run: php artisan migrate --force
      - run: php artisan test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
        env:
          VITE_API_BASE_URL: http://localhost
      - run: npm run build

  lighthouse:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/app/package-lock.json
      - run: npm ci
      - run: npm run build
      # Servir el build estático y ejecutar Lighthouse contra él
      - name: Auditoría Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: frontend/app/.lighthouserc.json
